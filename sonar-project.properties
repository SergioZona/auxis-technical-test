# Self-hosted SonarQube — see SONAR_HOST_URL secret in GitHub Actions
sonar.projectKey=auxis-technical-test
sonar.projectName=Auxis Technical Test

sonar.sources=src,docker
sonar.tests=tests
sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,**/migrations/**,**/*.pyc
