version: '3.8'

services:
  prod-db:
    image: postgres:17-alpine
    container_name: auxis_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: app_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d app_prod" ]
      interval: 60s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: auxis_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: auxis_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=prod
      - DATABASE_HOST=prod-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=app_prod
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-auxis}
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - api_data:/app/data
    networks:
      - default
      - dokploy-network
    depends_on:
      prod-db:
        condition: service_healthy
      qdrant:
        condition: service_started

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: auxis_ui
    restart: unless-stopped
    command: [ "streamlit", "run", "ui/app.py", "--server.port", "8501", "--server.address", "0.0.0.0" ]
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api/v1
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    networks:
      - default
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 5
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  api_data:

networks:
  default:
  dokploy-network:
    external: true
