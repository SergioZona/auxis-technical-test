version: '3.8'

services:
  prod-db:
    image: postgres:17-alpine
    container_name: auxis_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: app_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d app_prod" ]
      interval: 60s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: auxis_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  langfuse:
    image: langfuse/langfuse:2
    container_name: auxis_langfuse
    restart: unless-stopped
    depends_on:
      prod-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app:${DATABASE_PASSWORD}@prod-db:5432/langfuse
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - TELEMETRY_ENABLED=false
      - SALT=${SALT}

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: auxis_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=prod
      - DATABASE_HOST=prod-db
      - DATABASE_PORT=5432
      - DATABASE_NAME=app_prod
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    volumes:
      - api_data:/app/data
    depends_on:
      prod-db:
        condition: service_healthy
      qdrant:
        condition: service_started
      langfuse:
        condition: service_started

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: auxis_ui
    restart: unless-stopped
    command: [ "streamlit", "run", "ui/app.py", "--server.port", "8501", "--server.address", "0.0.0.0" ]
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api/v1
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  api_data:
